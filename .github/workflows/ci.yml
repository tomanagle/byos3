name: CI

# Runs on every PR (any base, including main) and on pushes to main. The `main` branch ruleset
# requires the `lint`, `test`, and `build` checks to pass before a PR can merge.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: oxlint
        run: bun run lint
      - name: oxfmt --check
        run: bun run format:check
      # Agent skills (@tanstack/intent): frontmatter must validate, and skills must not be stale vs
      # the source docs they reference (a referenced agents/docs/*.md changing without the skill being
      # regenerated + bumped flags here). See agents/docs/agent-skills.md.
      - name: Agent skills (validate + stale)
        run: bunx @tanstack/intent validate && bunx @tanstack/intent stale

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Packages and the API run in SEPARATE bun-test processes on purpose: @hono/zod-openapi extends
      # Zod globally for the API, which clashes with the plain-zod packages if they share one process.
      # The e2e suite is excluded here - it needs a live MinIO bucket; run it with `bun run e2e`.
      - name: Tests (packages)
        run: bun test workspaces/packages
      - name: Tests (api)
        run: bun test workspaces/apps/api

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build web Worker
        run: bun run build
