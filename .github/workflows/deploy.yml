name: Deploy

# Deployments are driven by VERSION TAGS, not branch pushes. Cut a release with:
#   git tag v1.2.3 && git push origin v1.2.3
# Each tag runs the full pipeline; Pulumi (state in R2) + the D1 migration ledger make every run
# incremental from the currently-deployed state, so re-tagging is safe and only applies the delta.
# `workflow_dispatch` lets you re-run a deploy from any selected tag/branch in the Actions UI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize deploys so two tags can't race on the shared Pulumi state / D1 / Workers.
  group: deploy-production
  cancel-in-progress: false

# To deploy your OWN copy, set these in GitHub → Settings → Secrets and variables → Actions.
# No code changes needed - the workflow injects your domain + secrets at deploy time.
#
#   Secrets:
#     CLOUDFLARE_API_TOKEN        token with Workers + D1 + Turnstile + DNS + R2 edit permissions
#     CLOUDFLARE_ACCOUNT_ID       your Cloudflare account id
#     R2_ACCESS_KEY_ID            R2 S3 API access key id  (Cloudflare → R2 → Manage API Tokens)
#     R2_SECRET_ACCESS_KEY        the paired R2 S3 API secret
#     PULUMI_CONFIG_PASSPHRASE    passphrase that encrypts secrets inside the Pulumi state (any strong string)
#     BETTER_AUTH_SECRET          random 32+ char string  (openssl rand -base64 32)
#     CREDENTIAL_ENCRYPTION_KEY   32-byte base64 key       (openssl rand -base64 32)
#     STRIPE_SECRET_KEY           (optional) LIVE Stripe key - enables billing: Pulumi provisions the
#                                 product/prices/webhook and the web Worker runs Checkout. Unset = off.
#     AUTH_GITHUB_CLIENT_SECRET   (optional) GitHub OAuth app secret - enables "Continue with GitHub"
#   Secrets OR Variables:
#     AUTH_GITHUB_CLIENT_ID       (optional) GitHub OAuth app client id (pairs with the secret above)
#   Variables:
#     APP_DOMAIN                  your apex domain, e.g. example.com  (the zone must exist in your CF account)
#     PULUMI_STACK                stack name (optional, default `production`)
#     PULUMI_STATE_BUCKET         R2 bucket for Pulumi state (optional, default `byos3-pulumi-state`)
#     DEPLOY_WEB / DEPLOY_API / DEPLOY_DOCS  (optional, default true) set to `false` to skip deploying
#                                 that surface - e.g. DEPLOY_DOCS=false to not publish the API reference
#
# Pulumi state lives in an R2 bucket - no Pulumi Cloud account needed. The workflow auto-creates the
# bucket if missing and stores state there (DIY backends lock + encrypt state; secrets are sealed with
# PULUMI_CONFIG_PASSPHRASE). Result: the app deploys to APP_DOMAIN, the API to api.APP_DOMAIN, and the
# docs to docs.APP_DOMAIN. See agents/docs/deployment.md.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PULUMI_STACK: ${{ vars.PULUMI_STACK || 'production' }}
      # Pulumi DIY backend on R2 (S3-compatible). PULUMI_BACKEND_URL points the CLI + action at the
      # bucket; the AWS_* vars are the R2 S3 API credentials; the passphrase seals state secrets.
      PULUMI_STATE_BUCKET: ${{ vars.PULUMI_STATE_BUCKET || 'byos3-pulumi-state' }}
      PULUMI_BACKEND_URL: "s3://${{ vars.PULUMI_STATE_BUCKET || 'byos3-pulumi-state' }}?endpoint=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com&region=auto&s3ForcePathStyle=true"
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_REGION: auto
      # APP_DOMAIN flows into Pulumi (Turnstile domains) AND the wrangler rewrites below.
      APP_DOMAIN: ${{ vars.APP_DOMAIN || 'byos3.com' }}
      # The git tag being deployed (e.g. v1.2.3) - equals the root package.json version that `release`
      # bumped. Used for the run summary; the docs spec reads the version from package.json directly.
      APP_VERSION: ${{ github.ref_name }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
      # Billing (optional). ONE live Stripe key drives both sides: Pulumi reads it as STRIPE_API_KEY to
      # provision the product/prices/webhook, and the web Worker gets it as STRIPE_SECRET_KEY at runtime.
      # Unset = billing stays disabled (Pulumi skips Stripe, the Stripe Worker secrets aren't set).
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_API_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      # Social login (optional). The GitHub OAuth app credentials for the web Worker - set both to show
      # "Continue with GitHub", neither for email/password only. CLIENT_ID is not sensitive, so accept
      # it as a repo Variable or a Secret; the secret is secret-only. (GitHub forbids GITHUB_-prefixed
      # names, hence AUTH_GITHUB_*.)
      AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID || vars.AUTH_GITHUB_CLIENT_ID }}
      AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # 1) Provision Cloudflare infra (D1 + Turnstile) with Pulumi. State lives in R2 (PULUMI_BACKEND_URL).
      - name: Install infra deps
        run: cd infra && bun install
      # Create the R2 state bucket on first run (idempotent). Pulumi can't provision its own state
      # store, so we bootstrap it with Wrangler using the same Cloudflare token.
      - name: Ensure Pulumi state bucket (R2)
        working-directory: workspaces/apps/api
        run: bunx wrangler r2 bucket create "$PULUMI_STATE_BUCKET" || echo "(state bucket already exists)"
      - name: Pulumi up
        uses: pulumi/actions@v6
        env:
          # The pulumi-stripe provider plugin is published to the author's GitHub releases, not the
          # Pulumi registry (its SDK declares `server: github://...`). `pulumi up` auto-downloads it on
          # first use; GITHUB_TOKEN authenticates that fetch so it isn't anonymously rate-limited.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: up
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
          stack-name: ${{ vars.PULUMI_STACK || 'production' }}
          work-dir: infra
          upsert: true

      # 2) Read the IDs Pulumi just provisioned.
      - name: Read infra outputs
        id: infra
        working-directory: infra
        run: |
          echo "d1_id=$(pulumi stack output d1DatabaseId --stack "$PULUMI_STACK")" >> "$GITHUB_OUTPUT"
          echo "site_key=$(pulumi stack output turnstileSiteKey --stack "$PULUMI_STACK")" >> "$GITHUB_OUTPUT"
          pulumi stack output turnstileSecretKey --show-secrets --stack "$PULUMI_STACK" > "$RUNNER_TEMP/ts_secret"
          # Stripe outputs only exist when billing was provisioned (STRIPE_SECRET_KEY set) - tolerate absence.
          echo "stripe_monthly=$(pulumi stack output stripePriceMonthlyId --stack "$PULUMI_STACK" 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "stripe_annual=$(pulumi stack output stripePriceAnnualId --stack "$PULUMI_STACK" 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          pulumi stack output stripeWebhookSecret --show-secrets --stack "$PULUMI_STACK" 2>/dev/null > "$RUNNER_TEMP/stripe_webhook" || true

      # 3) Inject the real D1 id and APP_DOMAIN into the Worker configs. The committed configs ship
      #    byos3.com / a placeholder D1 id; CI rewrites them so a fork "just works" from its GitHub
      #    variables. The domain rewrite also updates the custom_domain route patterns - this is what
      #    wires up DNS for each hostname: web → APP_DOMAIN, api → api.APP_DOMAIN, docs → docs.APP_DOMAIN.
      #    Wrangler provisions the proxied DNS record + edge TLS for each custom_domain on deploy (the
      #    zone must already exist). The Turnstile SITE key is NOT a Worker var - it's a build-time
      #    Vite var inlined into the client bundle (see "Build web" below); the SECRET is set later.
      - name: Configure web wrangler
        working-directory: workspaces/apps/web
        run: |
          sed -i "s/local-dev-placeholder/${{ steps.infra.outputs.d1_id }}/" wrangler.jsonc
          sed -i "s|byos3\.com|${APP_DOMAIN}|g" wrangler.jsonc
      - name: Configure API wrangler
        working-directory: workspaces/apps/api
        run: |
          sed -i "s/local-dev-placeholder/${{ steps.infra.outputs.d1_id }}/" wrangler.jsonc
          sed -i "s|byos3\.com|${APP_DOMAIN}|g" wrangler.jsonc
          sed -i "s|byos3\.com|${APP_DOMAIN}|g" wrangler.docs.jsonc

      # 4) Build, migrate the shared D1, deploy both Workers, then set their secrets.
      - name: Build web
        # The PUBLIC Turnstile site key from the Pulumi widget is inlined into the client bundle here
        # by Vite (import.meta.env.VITE_TURNSTILE_SITE_KEY) - the only build-time-baked secret-ish value.
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ steps.infra.outputs.site_key }}
        run: bun run build
      - name: Migrate D1 (remote)
        working-directory: workspaces/apps/web
        run: bunx wrangler d1 migrations apply DB --remote
      - name: Deploy web Worker
        if: ${{ vars.DEPLOY_WEB != 'false' }}
        working-directory: workspaces/apps/web
        run: bunx wrangler deploy
      - name: Deploy API Worker
        if: ${{ vars.DEPLOY_API != 'false' }}
        working-directory: workspaces/apps/api
        run: bunx wrangler deploy

      # 4b) Build the static OpenAPI docs from the API's own schema and deploy them as a static-assets
      #     Worker at docs.APP_DOMAIN. docs:build reads APP_DOMAIN from env so Scalar's "Try It" points
      #     at api.APP_DOMAIN. No secrets - it serves static files only.
      - name: Build + deploy docs Worker
        if: ${{ vars.DEPLOY_DOCS != 'false' }}
        working-directory: workspaces/apps/api
        run: |
          bun run docs:build
          bunx wrangler deploy --config wrangler.docs.jsonc

      # 5) Set secrets on the now-deployed Workers. Turnstile's secret comes from Pulumi; the auth +
      #    credential-encryption keys come from your GitHub secrets. Applied to BOTH Workers (they
      #    share the same D1 + Better Auth config).
      - name: Set web secrets
        if: ${{ vars.DEPLOY_WEB != 'false' }}
        working-directory: workspaces/apps/web
        run: |
          bunx wrangler secret put TURNSTILE_SECRET_KEY < "$RUNNER_TEMP/ts_secret"
          printf '%s' "$BETTER_AUTH_SECRET" | bunx wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "$CREDENTIAL_ENCRYPTION_KEY" | bunx wrangler secret put CREDENTIAL_ENCRYPTION_KEY
          # Billing runs on the web Worker only. Set the runtime key + the Pulumi-provisioned price IDs
          # and webhook secret - ONLY when a Stripe key is configured (empty puts would half-enable it).
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            printf '%s' "$STRIPE_SECRET_KEY" | bunx wrangler secret put STRIPE_SECRET_KEY
            printf '%s' "${{ steps.infra.outputs.stripe_monthly }}" | bunx wrangler secret put STRIPE_PRICE_MONTHLY
            printf '%s' "${{ steps.infra.outputs.stripe_annual }}" | bunx wrangler secret put STRIPE_PRICE_ANNUAL
            bunx wrangler secret put STRIPE_WEBHOOK_SECRET < "$RUNNER_TEMP/stripe_webhook"
          fi
          # Social login (web Worker only). "Continue with GitHub" shows when both are set.
          if [ -n "$AUTH_GITHUB_CLIENT_ID" ] && [ -n "$AUTH_GITHUB_CLIENT_SECRET" ]; then
            printf '%s' "$AUTH_GITHUB_CLIENT_ID" | bunx wrangler secret put AUTH_GITHUB_CLIENT_ID
            printf '%s' "$AUTH_GITHUB_CLIENT_SECRET" | bunx wrangler secret put AUTH_GITHUB_CLIENT_SECRET
          fi
      - name: Set API secrets
        if: ${{ vars.DEPLOY_API != 'false' }}
        working-directory: workspaces/apps/api
        run: |
          printf '%s' "$BETTER_AUTH_SECRET" | bunx wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "$CREDENTIAL_ENCRYPTION_KEY" | bunx wrangler secret put CREDENTIAL_ENCRYPTION_KEY

      # 6) Record what was deployed where (visible on the Actions run + the production Environment).
      - name: Deployment summary
        if: always()
        run: |
          web='${{ vars.DEPLOY_WEB }}'; api='${{ vars.DEPLOY_API }}'; docs='${{ vars.DEPLOY_DOCS }}'
          on() { [ "$1" != 'false' ] && echo "https://$2" || echo "_skipped_"; }
          {
            echo "### Deployed \`$APP_VERSION\`"
            echo ""
            echo "| Surface | URL |"
            echo "| --- | --- |"
            echo "| Web | $(on "$web" "$APP_DOMAIN") |"
            echo "| API | $(on "$api" "api.$APP_DOMAIN") |"
            echo "| Docs | $(on "$docs" "docs.$APP_DOMAIN") |"
            echo "| Billing | $([ -n "$STRIPE_SECRET_KEY" ] && echo 'enabled (Stripe)' || echo 'disabled (everything unlocked)') |"
          } >> "$GITHUB_STEP_SUMMARY"
