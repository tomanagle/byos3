name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Required repo config:
#   secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, PULUMI_ACCESS_TOKEN
#   vars:    PULUMI_STACK  (e.g. "myorg/byos3/production")
# See agents/docs/deployment.md.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # 1) Provision Cloudflare infra (D1 + Turnstile) with Pulumi.
      - name: Install infra deps
        run: cd infra && bun install
      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ vars.PULUMI_STACK }}
          work-dir: infra
          upsert: true

      # 2) Read the IDs Pulumi just provisioned.
      - name: Read infra outputs
        id: infra
        working-directory: infra
        run: |
          echo "d1_id=$(pulumi stack output d1DatabaseId --stack "$PULUMI_STACK")" >> "$GITHUB_OUTPUT"
          echo "site_key=$(pulumi stack output turnstileSiteKey --stack "$PULUMI_STACK")" >> "$GITHUB_OUTPUT"
          pulumi stack output turnstileSecretKey --show-secrets --stack "$PULUMI_STACK" > "$RUNNER_TEMP/ts_secret"
        env:
          PULUMI_STACK: ${{ vars.PULUMI_STACK }}

      # 3) Inject the real D1 id + Turnstile site key into the Worker config.
      - name: Configure wrangler
        working-directory: workspaces/apps/web
        run: |
          sed -i "s/local-dev-placeholder/${{ steps.infra.outputs.d1_id }}/" wrangler.jsonc
          sed -i "s/1x00000000000000000000AA/${{ steps.infra.outputs.site_key }}/" wrangler.jsonc

      # 4) Build the Worker, migrate the remote D1, set the Turnstile secret, deploy.
      - name: Build
        run: bun run build
      - name: Migrate D1 (remote)
        working-directory: workspaces/apps/web
        run: bunx wrangler d1 migrations apply DB --remote
      - name: Set worker secrets
        working-directory: workspaces/apps/web
        run: bunx wrangler secret put TURNSTILE_SECRET_KEY < "$RUNNER_TEMP/ts_secret"
      - name: Deploy web (byos3.com)
        working-directory: workspaces/apps/web
        run: bunx wrangler deploy

      # 5) Deploy the API Worker to api.byos3.com against the SAME D1 (migrations already applied
      #    above; the api binds the same database). Its custom_domain route provisions the hostname.
      - name: Configure API wrangler
        working-directory: workspaces/apps/api
        run: sed -i "s/local-dev-placeholder/${{ steps.infra.outputs.d1_id }}/" wrangler.jsonc
      - name: Deploy API (api.byos3.com)
        working-directory: workspaces/apps/api
        run: bunx wrangler deploy
