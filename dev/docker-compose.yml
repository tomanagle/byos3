# Local containerized dev for byos3 - `bun run docker:up`.
#
#   web  → http://localhost:${WEB_PORT:-4500}    (TanStack Start / vite dev, under Node)
#   api  → http://localhost:${API_PORT:-8788}    (Hono / wrangler dev - workerd, under Node)
#   docs → http://localhost:${DOCS_PORT:-8789}   (static OpenAPI + Scalar site - mirrors docs.<domain>)
#
# Both Workers share ONE local-D1 volume (a key minted on web verifies on api), exactly like prod
# where they bind the same D1. The `migrator` service applies migrations to that volume and then
# WATCHES the migrations dir (bind-mounted from the host) - save a new migration and it auto-applies.
# web/api wait for the migrator to be healthy (initial migrations done) before starting. The `docs`
# service builds the API reference from the route schemas and rebuilds when they change; it touches
# no DB, so it starts independently.
#
# Servers run under Node, not Bun (Wrangler doesn't support the Bun runtime). Tear down with
# `bun run docker:nuke`. Host ports default to 4500/8788/8789 (3000 is taken on some machines);
# override with `WEB_PORT=4000 API_PORT=9000 DOCS_PORT=9001 bun run docker:up`.
name: byos3-dev

services:
  migrator:
    image: byos3-dev:local
    build:
      context: ..
      dockerfile: dev/Dockerfile
    command: node /app/dev/migrate-watch.mjs
    volumes:
      - d1:/state
      # Bind the host migrations dir so newly-saved migrations are seen + auto-applied.
      - ../workspaces/apps/web/migrations:/app/workspaces/apps/web/migrations:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/migrator-ready"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s

  web:
    image: byos3-dev:local
    build:
      context: ..
      dockerfile: dev/Dockerfile
    working_dir: /app/workspaces/apps/web
    command: npx vite dev --host 0.0.0.0 --port 4500
    environment:
      # Poll the filesystem so vite/chokidar reliably sees edits across the Docker bind mount (macOS
      # doesn't propagate inotify events into the VM). Required for HMR.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-4500}:4500"
    volumes:
      # Live host source so vite HMR sees your edits. node_modules is an ANONYMOUS volume so the
      # container keeps its own linux deps (the host's macOS node_modules would break workerd/esbuild),
      # and `bun run docker:rebuild` (up --build -V) refreshes it after a dependency change. The local
      # D1 lives in the shared d1 volume (nested under the source bind).
      - ..:/app
      - /app/node_modules
      - d1:/app/workspaces/apps/web/.wrangler/state
    depends_on:
      migrator:
        condition: service_healthy

  api:
    image: byos3-dev:local
    build:
      context: ..
      dockerfile: dev/Dockerfile
    working_dir: /app/workspaces/apps/api
    command: npx wrangler dev --ip 0.0.0.0 --port 8787 --persist-to /state
    ports:
      - "${API_PORT:-8788}:8787"
    volumes:
      # Same pattern as web: live source so wrangler reloads on edits; node_modules is an anonymous
      # volume holding the image's linux install (refreshed by `bun run docker:rebuild`).
      - ..:/app
      - /app/node_modules
      - d1:/state
    depends_on:
      migrator:
        condition: service_healthy

  docs:
    image: byos3-dev:local
    build:
      context: ..
      dockerfile: dev/Dockerfile
    # Build the API reference from the route schemas, wait for that first build, then serve dist-docs
    # with `wrangler dev` - the same static-assets Worker config (wrangler.docs.jsonc) that runs in
    # prod at docs.<domain>. docs-watch keeps rebuilding when the schemas change. No DB needed.
    command:
      - sh
      - -c
      - |
        node /app/dev/docs-watch.mjs &
        until [ -f /tmp/docs-ready ]; do sleep 0.5; done
        cd /app/workspaces/apps/api
        exec npx wrangler dev --config wrangler.docs.jsonc --ip 0.0.0.0 --port 8789
    environment:
      # Scalar's "Try It" runs in YOUR browser, so point it at the API's published host port (not the
      # container hostname). Cross-origin, exactly like prod (docs.<domain> → api.<domain>).
      DOCS_BASE_SERVER_URL: "http://localhost:${API_PORT:-8788}"
    ports:
      - "${DOCS_PORT:-8789}:8789"
    volumes:
      # Live source so docs-watch sees schema edits; node_modules is the image's linux install.
      - ..:/app
      - /app/node_modules

  # An S3-compatible "fake bucket" (MinIO) that's part of the local stack - connect it from the web
  # app's Connect dialog as a Custom S3 volume, and the e2e suite uses it too (no separate compose):
  #   endpoint http://localhost:${MINIO_PORT:-9400} · key byos3 · secret byos3secret · bucket byos3-e2e
  # Non-standard host ports (9000/9001 are often taken, e.g. OrbStack); override with MINIO_PORT /
  # MINIO_CONSOLE_PORT / MINIO_ROOT_USER / MINIO_ROOT_PASSWORD / MINIO_BUCKET.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-byos3}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-byos3secret}
    ports:
      - "${MINIO_PORT:-9400}:9000"
      - "${MINIO_CONSOLE_PORT:-9401}:9001"
    volumes:
      - minio:/data

  # Creates the bucket once MinIO is up, then exits 0 (idempotent). The e2e global-setup waits on it.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-byos3}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-byos3secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-byos3-e2e}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 1;
        done
        mc mb -p "local/$$MINIO_BUCKET"
        echo "bucket local/$$MINIO_BUCKET ready"

  # Local Stripe: ensures the sandbox product/prices exist, writes price IDs + the webhook signing
  # secret into web .dev.vars, and forwards webhook events to web. No-ops (exits 0) when
  # STRIPE_SECRET_KEY isn't set, so core local dev needs no Stripe. See dev/stripe-setup.sh,
  # agents/docs/billing.md.
  stripe:
    image: stripe/stripe-cli:latest
    entrypoint: /bin/sh
    command: /app/dev/stripe-setup.sh
    volumes:
      - ..:/app
    depends_on:
      - web
    restart: on-failure

volumes:
  d1:
  minio:
